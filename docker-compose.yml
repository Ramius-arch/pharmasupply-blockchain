services:
  hardhat:
    build:
      context: ./web3
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    networks:
      - pharmasupply-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://host.docker.internal:27017/pharmasupply
      - JWT_SECRET=your-super-secret-key
      - LOG_LEVEL=info
      - PORT=3000
      - HARDHAT_RPC_URL=http://hardhat:8545
      - DEV_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    depends_on:
      - hardhat
    networks:
      - pharmasupply-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - pharmasupply-net
    environment:
      - VITE_API_BASE_URL=http://localhost:3000

networks:
  pharmasupply-net:
    driver: bridge
