services:
  mongodb:
    image: mongo:7.0
    container_name: pharmasupply-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pharmasupply
    volumes:
      - mongodb-data:/data/db
    networks:
      - pharmasupply-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  hardhat:
    build:
      context: ./web3
      dockerfile: Dockerfile
    container_name: pharmasupply-hardhat
    ports:
      - "8545:8545"
    networks:
      - pharmasupply-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8545 -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"net_version\",\"params\":[],\"id\":1}' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmasupply-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/pharmasupply
      - HARDHAT_RPC_URL=http://hardhat:8545
    depends_on:
      mongodb:
        condition: service_healthy
      hardhat:
        condition: service_healthy
    networks:
      - pharmasupply-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api-docs || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharmasupply-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - pharmasupply-net

networks:
  pharmasupply-net:
    driver: bridge

volumes:
  mongodb-data:
